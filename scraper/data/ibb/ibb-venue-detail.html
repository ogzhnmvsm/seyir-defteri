    <script>
        $(document).ready(function () {

            CheckOpenSeans();

            setInterval(function () {
                CheckOpenSeans();
            }, 1000);
        });

        function CheckOpenSeans() {

            var now = new Date();
            var hours = (now.getHours()).toString();
            var months = (now.getMonth() + 1).toString();
            var years = now.getFullYear().toString();
            var days = (now.getDate()).toString();
            var minutes = now.getMinutes().toString();

            if (hours.length == 1) { hours = '0' + hours };
            if (days.length == 1) { days = '0' + days };
            if (minutes.length == 1) { minutes = '0' + minutes };
            if (months.length == 1) { months = '0' + months };

            var todaysDate = Number(years + months + days + hours + minutes);

            $("*[data-acilis]").each(function (index) {

                var acilisSayi = Number($(this).attr("data-acilis"));

                if (acilisSayi <= todaysDate) {

                    $(this).removeAttr("data-acilis");
                    $(this).removeAttr("style");
                    $(this).text("Biletini Al");
                }

            });
        }
    </script>
